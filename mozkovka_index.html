<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mozková olympiáda</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;padding:12px;background:#f5f5f5;color:#1f4bc1;max-width:480px;margin:auto}
h2{font-family:'Luckiest Guy';font-size:32px}
button{background:#1f4bc1;color:#fff;border:none;border-radius:20px;padding:14px;width:100%;font-size:16px;margin-top:8px}
textarea,input{width:100%;padding:12px;font-size:16px;box-sizing:border-box;border-radius:10px;border:1px solid #ddd}
textarea{min-height:100px}
.team{color:gray;font-size:12px}
img{width:100%;max-width:300px;border-radius:10px}
</style>
</head>
<body>
<div id="start">
<h2>Mozková olympiáda</h2>
<input id="teamInput" placeholder="Název týmu">
<br><br>
<button onclick="saveTeam()">Start</button>
</div>
<div id="app"></div>
<script>
const scriptURL="https://script.google.com/macros/s/AKfycbzVIxT_PPm6GRhmVuHvVA6UlFQI93FdNa7PqMkcAUXQRoOxhiwV59Wzbta9D9VWSO1cFQ/exec";
let team=localStorage.getItem("team");
const station=new URLSearchParams(window.location.search).get("station");
function saveState(s){localStorage.setItem("gameState",JSON.stringify(s));}
function loadState(){return JSON.parse(localStorage.getItem("gameState"));}
function clearState(){localStorage.removeItem("gameState");}
if(team){startApp();}
function saveTeam(){team=document.getElementById("teamInput").value;localStorage.setItem("team",team);startApp();}
function startApp(){document.getElementById("start").style.display="none";let s=loadState();if(s){restore(s);return;}runStation();}
function runStation(){if(station==1)slepec();if(station==2)tichaPosta();if(station==3)memoryRun();if(station==4)puzzle();if(station==5)plakat();if(station==6)numberIntro();if(station==7)geoIntro();if(station==8)prisloviIntro();if(station==9)bezDotyku();if(station==10)videohry();if(station==11)vlastovka();if(station==12)matematikaIntro();if(station==13)zakladDneIntro();}
function restore(s){if(s.station==1)s.running?startSlepec(true,s.t):slepec();if(s.station==2)tichaPosta();if(s.station==3)startMemory(true,s.t);if(s.station==4){pTime=s.pTime||0;startPuzzle(true);}if(s.station==5)startPlakat(true);if(s.station==6){ni=s.ni||0;showNum();}if(s.station==7){gi=s.gi||0;answers=s.answers||[];showGeo();}if(s.station==8){pi=s.pi||0;prisloviAnswers=s.answers||[];showPrislovi();}if(s.station==9){bdTime=s.t||0;startBD(true);}if(s.station==10)startVideohry(true);if(s.station==11)vlastovka();if(s.station==12){mI=s.mI||0;showMath();}if(s.station==13){zI=s.zI||0;showZaklad();}}
function send(d){fetch(scriptURL,{method:"POST",mode:"no-cors",body:JSON.stringify({team:team,...d})});}
function confirmScreen(){clearState();app.innerHTML="<h2>✅ Hotovo</h2>";}
let slepecTimer;function slepec(){app.innerHTML=`<h3 class="team">${team}</h3><h2>Slepec</h2><button onclick="startSlepec()">Start</button>`;}function startSlepec(r=false,t=240){saveState({station:1,running:true,t});app.innerHTML=`<h2 id="t"></h2><button onclick="finishSlepec()">Hotovo</button>`;slepecTimer=setInterval(()=>{t--;saveState({station:1,running:true,t});tEl=document.getElementById("t");if(tEl)tEl.innerText=Math.floor(t/60)+":"+(t%60<10?"0":"")+t%60;},1000);}function finishSlepec(){clearInterval(slepecTimer);send({station:1,answer:"PHOTO"});confirmScreen();}
function tichaPosta(){app.innerHTML=`<h3>${team}</h3><h2>Tichá pošta</h2><input type="file" accept="image/*" capture><button onclick="finishTP()">Hotovo</button>`;}function finishTP(){send({station:2,answer:"PHOTO"});confirmScreen();}
let memTimer;function memoryRun(){app.innerHTML=`<h3>${team}</h3><h2>Memory</h2><button onclick="startMemory()">Start</button>`;}function startMemory(r=false,t=240){saveState({station:3,t});app.innerHTML=`<h2 id="mt"></h2><textarea id="txt"></textarea><button onclick="finishMemory()">Hotovo</button>`;memTimer=setInterval(()=>{t--;saveState({station:3,t});mt.innerText=Math.floor(t/60)+":"+(t%60<10?"0":"")+t%60;},1000);}function finishMemory(){clearInterval(memTimer);send({station:3,answer:txt.value});confirmScreen();}
let pTime=0,pTimer;function puzzle(){app.innerHTML=`<h3>${team}</h3><h2>Puzzle</h2><button onclick="startPuzzle()">Start</button>`;}function startPuzzle(r=false){saveState({station:4,pTime});app.innerHTML=`<h2 id="pt"></h2><button onclick="stopPuzzle()">Stop</button>`;pTimer=setInterval(()=>{pTime++;saveState({station:4,pTime});pt.innerText=Math.floor(pTime/60)+":"+((pTime%60<10)?"0":"")+pTime%60;},1000);}function stopPuzzle(){clearInterval(pTimer);app.innerHTML=`<h2>${pt.innerText}</h2><button onclick="finishPuzzle()">Hotovo</button>`;}function finishPuzzle(){send({station:4,answer:pTime});confirmScreen();}
function plakat(){app.innerHTML=`<h3>${team}</h3><h2>Plakát</h2><button onclick="startPlakat()">Start</button>`;}function startPlakat(r=false){app.innerHTML=`<textarea id="p"></textarea><button onclick="finishPlakat()">Hotovo</button>`;}function finishPlakat(){send({station:5,answer:p.value});confirmScreen();}
let ni=0;const num=["_ dalmatinů","Fallout _","Apollo _"];function numberIntro(){app.innerHTML=`<h3>${team}</h3><button onclick="startNumber()">Start</button>`;}function startNumber(){ni=0;showNum();}function showNum(){saveState({station:6,ni});app.innerHTML=`<h2>${ni+1}</h2><p>${num[ni]}</p><input id="n"><button onclick="submitNum()">Další</button>`;}function submitNum(){send({station:6,question:ni+1,answer:n.value});ni++;if(ni<num.length)showNum();else confirmScreen();}
let gi=0,answers=[];const geo=[{img:'<img src="images/paraguay.png">',opt:['Paraguay','Chile']}];function geoIntro(){app.innerHTML=`<h3>${team}</h3><button onclick="startGeo()">Start</button>`;}function startGeo(){gi=0;answers=[];showGeo();}function showGeo(){saveState({station:7,gi,answers});let q=geo[gi];app.innerHTML=`<h2>${gi+1}</h2>${q.img}${q.opt.map(o=>`<button onclick="ansGeo('${o}')">${o}</button>`).join("")}`;}function ansGeo(a){answers.push(a);gi++;if(gi<geo.length)showGeo();else finishGeo();}function finishGeo(){answers.forEach((a,i)=>send({station:7,question:i+1,answer:a}));confirmScreen();}
let pi=0,prisloviAnswers=[];function prisloviIntro(){app.innerHTML=`<h3>${team}</h3><button onclick="startPrislovi()">Start</button>`;}function startPrislovi(){pi=0;prisloviAnswers=[];showPrislovi();}function showPrislovi(){saveState({station:8,pi,answers:prisloviAnswers});app.innerHTML=`<h2>${pi+1}</h2><input id="prInput"><button onclick="nextPrislovi()">Další</button>`;}function nextPrislovi(){prisloviAnswers.push(prInput.value);pi++;if(pi<10)showPrislovi();else finishPrislovi();}function finishPrislovi(){prisloviAnswers.forEach((a,i)=>send({station:8,question:i+1,answer:a}));confirmScreen();}
let bdTime=0,bdTimer;function bezDotyku(){app.innerHTML=`<h3>${team}</h3><button onclick="startBD()">Start</button>`;}function startBD(r=false){saveState({station:9,t:bdTime});app.innerHTML=`<h2 id="bdTimer"></h2><button onclick="stopBD()">Stop</button>`;bdTimer=setInterval(()=>{bdTime++;saveState({station:9,t:bdTime});bdTimerEl=document.getElementById("bdTimer");bdTimerEl.innerText=Math.floor(bdTime/60)+":"+(bdTime%60<10?"0":"")+bdTime%60;},1000);}function stopBD(){clearInterval(bdTimer);app.innerHTML=`<h2>${Math.floor(bdTime/60)}:${bdTime%60}</h2><button onclick="finishBD()">Hotovo</button>`;}function finishBD(){send({station:9,answer:bdTime});confirmScreen();}
function videohry(){app.innerHTML=`<h3>${team}</h3><button onclick="startVideohry()">Start</button>`;}function startVideohry(r=false){app.innerHTML=`<textarea id="vgInput"></textarea><button onclick="finishVideohry()">Hotovo</button>`;saveState({station:10});}function finishVideohry(){send({station:10,answer:vgInput.value});confirmScreen();}
function vlastovka(){app.innerHTML=`<h3>${team}</h3><button onclick="finishVlastovka()">Hotovo</button>`;}function finishVlastovka(){send({station:11,answer:"DONE"});confirmScreen();}
let mI=0;const mathQ=["Q1","Q2"];function matematikaIntro(){app.innerHTML=`<h3>${team}</h3><button onclick="startMatematika()">Start</button>`;}function startMatematika(){mI=0;showMath();}function showMath(){saveState({station:12,mI});app.innerHTML=`<h2>${mI+1}</h2><textarea id="mathInput"></textarea><button onclick="nextMath()">Další</button>`;}function nextMath(){send({station:12,question:mI+1,answer:mathInput.value});mI++;if(mI<2)showMath();else confirmScreen();}
let zI=0;const zakladQ=["Z1","Z2"];function zakladDneIntro(){app.innerHTML=`<h3>${team}</h3><button onclick="startZaklad()">Start</button>`;}function startZaklad(){zI=0;showZaklad();}function showZaklad(){saveState({station:13,zI});app.innerHTML=`<h2>${zI+1}</h2><textarea id="zakladInput"></textarea><button onclick="nextZaklad()">Další</button>`;}function nextZaklad(){send({station:13,question:zI+1,answer:zakladInput.value});zI++;if(zI<2)showZaklad();else confirmScreen();}
</script>
</body>
</html>
