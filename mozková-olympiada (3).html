<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mozková olympiáda</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue: #1f4bc1; --bg: #f0f4ff; --radius: 16px; --gap: 14px; }

  html { -webkit-text-size-adjust: none; text-size-adjust: none; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--blue);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    min-height: 100svh;
  }

  #start, #app {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: var(--gap);
  }

  h1 { font-family:'Luckiest Guy',cursive; font-size: 40px; text-align:center; line-height:1.1; }
  h2 { font-family:'Luckiest Guy',cursive; font-size: 32px; text-align:center; line-height:1.1; }
  h3 { font-size: 14px; color:#888; font-weight:400; text-align:center; }
  p  { font-size: 16px; line-height:1.5; text-align:center; color:#3a5acf; }

  button {
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 15px 20px;
    font-size: 16px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    width: 100%;
    cursor: pointer;
    min-height: 52px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  button.secondary {
    background: transparent;
    color: var(--blue);
    border: 2px solid var(--blue);
  }

  /* THE critical iOS zoom fix — font-size 16px on EVERY input/textarea */
  input, textarea, select {
    -webkit-appearance: none;
    appearance: none;
    display: block;
    width: 100%;
    padding: 13px 14px;
    border: 2px solid #c5d0f0;
    border-radius: var(--radius);
    font-size: 16px;
    font-family: 'Poppins', sans-serif;
    background: #fff;
    color: #222;
    outline: none;
    touch-action: manipulation;
    /* force 16px even if something overrides it */
    -webkit-text-size-adjust: 100%;
  }
  input:focus, textarea:focus { border-color: var(--blue); }
  textarea { min-height: 110px; resize: none; }

  img { max-width:100%; width:200px; display:block; margin:0 auto; border-radius:12px; }
  .timer { font-family:'Luckiest Guy',cursive; font-size:64px; text-align:center; }
  .progress { font-size:16px; text-align:center; color:#888; font-weight:600; }
  .card { background:#fff; border-radius:var(--radius); padding:18px 16px; box-shadow:0 2px 12px rgba(31,75,193,.08); }

  /* debug bar */
  #dbg { position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,.7); color:#0f0; font-size:11px; padding:4px 8px; font-family:monospace; display:none; z-index:999; }
</style>
</head>
<body>

<div id="start" style="display:none">
  <h1>Mozková<br>olympiáda</h1>
  <input type="text" id="teamInput" placeholder="Název týmu" autocomplete="off">
  <button onclick="saveTeam()">Start →</button>
</div>

<div id="app"></div>
<div id="dbg"></div>

<script>
// ─── DEBUG (tap footer 5x to show) ───────────────────────────────────────────
let dbgTaps = 0;
document.body.addEventListener('click', () => {
  dbgTaps++;
  if (dbgTaps === 5) {
    document.getElementById('dbg').style.display = 'block';
    dbgTaps = 0;
  }
});
function dbg(msg) {
  const el = document.getElementById('dbg');
  el.textContent = msg;
  console.log('[DBG]', msg);
}

// ─── GLOBALS ─────────────────────────────────────────────────────────────────
const scriptURL = "https://script.google.com/macros/s/AKfycbzVIxT_PPm6GRhmVuHvVA6UlFQI93FdNa7PqMkcAUXQRoOxhiwV59Wzbta9D9VWSO1cFQ/exec";

// Read station number — support both ?station=3 and /station/3 style URLs
const params = new URLSearchParams(window.location.search);
const station = params.get("station") || params.get("s") || (() => {
  const m = window.location.pathname.match(/(\d+)/);
  return m ? m[1] : null;
})();

let team = localStorage.getItem("team");
const app = document.getElementById("app");

dbg(`station=${station} team=${team} url=${window.location.href}`);

// ─── STATE ────────────────────────────────────────────────────────────────────
const STATE_KEY = `mo_s${station}`;

function saveState(step, data = {}) {
  try {
    const val = JSON.stringify({ step, data, ts: Date.now() });
    localStorage.setItem(STATE_KEY, val);
    dbg(`saved: step=${step} key=${STATE_KEY}`);
  } catch(e) { dbg('saveState error: ' + e); }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) { dbg('no saved state'); return null; }
    const st = JSON.parse(raw);
    dbg(`loaded: step=${st.step} age=${Math.round((Date.now()-st.ts)/1000)}s`);
    return st;
  } catch(e) { dbg('loadState error: ' + e); return null; }
}

function clearState() {
  localStorage.removeItem(STATE_KEY);
  dbg('state cleared');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  dbg(`init: station=${station} team=${team}`);

  if (!station) {
    app.innerHTML = `<h2>Chybí číslo stanice v URL</h2><p>Přidej ?station=1 do adresy</p>`;
    return;
  }

  if (team) {
    startApp();
  } else {
    document.getElementById("start").style.display = "flex";
  }
});

function saveTeam() {
  const val = document.getElementById("teamInput").value.trim();
  if (!val) return;
  team = val;
  localStorage.setItem("team", team);
  document.getElementById("start").style.display = "none";
  startApp();
}

function startApp() {
  document.getElementById("start").style.display = "none";
  const n = parseInt(station);
  dbg(`startApp station=${n}`);
  const map = {
    1:slepec, 2:tichaPosta, 3:memoryRun, 4:puzzle,
    5:plakat, 6:numberIntro, 7:geoIntro, 8:prisloviIntro,
    9:bezDotyku, 10:videohry, 11:vlastovka,
    12:matematikaIntro, 13:zakladDneIntro
  };
  if (map[n]) map[n]();
  else app.innerHTML = `<h2>Neznámá stanice ${n}</h2>`;
}

function send(data) {
  fetch(scriptURL, {
    method:"POST", mode:"no-cors",
    body: JSON.stringify({ team, ...data })
  }).catch(() => {});
}

function confirmScreen() {
  clearState();
  app.innerHTML = `<h2>✅ Hotovo,<br>tohle jste zvládli!</h2>`;
}

function teamTag() { return `<h3>Tým: ${team}</h3>`; }
function fmt(s) { return Math.floor(s/60)+":"+(s%60<10?"0":"")+s%60; }

// ─── 1 SLEPEC ────────────────────────────────────────────────────────────────
let slepecTimer;
function slepec() {
  const st = loadState();
  if (st?.step === "running") { resumeSlepec(st.data.elapsed||0); return; }
  app.innerHTML = `${teamTag()}<h2>Slepec</h2>
  <p>Jeden člen si zaváže oči, ostatní šeptají instrukce. Máte 4 minuty.</p>
  <button onclick="startSlepec()">Start</button>`;
}
function startSlepec() { saveState("running",{elapsed:0}); resumeSlepec(0); }
function resumeSlepec(from) {
  let t = 240 - from;
  app.innerHTML = `${teamTag()}<div class="timer"><span id="t">${fmt(t)}</span></div>
  <input id="f" type="file" accept="image/*" capture="environment" style="display:none">
  <button onclick="document.getElementById('f').click()">📷 Vyfotit</button>
  <button class="secondary" onclick="finishSlepec()">Hotovo</button>`;
  clearInterval(slepecTimer);
  slepecTimer = setInterval(()=>{
    t--; saveState("running",{elapsed:240-t});
    const el = document.getElementById("t");
    if(el) el.textContent = fmt(t);
    if(t<=0){ clearInterval(slepecTimer); alert("Čas vypršel!"); }
  },1000);
}
function finishSlepec() { clearInterval(slepecTimer); send({station:1,answer:"PHOTO"}); confirmScreen(); }

// ─── 2 TICHÁ POŠTA ───────────────────────────────────────────────────────────
function tichaPosta() {
  const st = loadState();
  if (st?.step==="running") { showTP(); return; }
  app.innerHTML = `${teamTag()}<h2>Tichá pošta</h2>
  <p>Kreslení vzoru na záda spoluhráče.</p>
  <button onclick="startTP()">Start</button>`;
}
function startTP() { saveState("running"); showTP(); }
function showTP() {
  app.innerHTML = `${teamTag()}<h2>Tichá pošta</h2>
  <input type="file" accept="image/*" capture="environment">
  <button onclick="finishTP()">Hotovo</button>`;
}
function finishTP() { send({station:2,answer:"PHOTO"}); confirmScreen(); }

// ─── 3 MEMORY ────────────────────────────────────────────────────────────────
let memTimer;
function memoryRun() {
  const st = loadState();
  if (st?.step==="running") { resumeMemory(st.data.elapsed||0, st.data.txt||""); return; }
  app.innerHTML = `${teamTag()}<h2>Memory run</h2>
  <p>Za 4 minuty si zapamatujte co nejvíce předmětů, pak je napište.</p>
  <button onclick="startMemory()">Start</button>`;
}
function startMemory() { saveState("running",{elapsed:0,txt:""}); resumeMemory(0,""); }
function resumeMemory(from, savedTxt) {
  let t = 240 - from;
  app.innerHTML = `${teamTag()}<div class="timer"><span id="mt">${fmt(t)}</span></div>
  <textarea id="txt" placeholder="Předměty...">${savedTxt}</textarea>
  <button onclick="finishMemory()">Hotovo</button>`;
  clearInterval(memTimer);
  memTimer = setInterval(()=>{
    t--; const txt = document.getElementById("txt");
    saveState("running",{elapsed:240-t, txt: txt?txt.value:""});
    const el = document.getElementById("mt");
    if(el) el.textContent = fmt(t);
    if(t<=0) clearInterval(memTimer);
  },1000);
}
function finishMemory() {
  clearInterval(memTimer);
  send({station:3, answer:document.getElementById("txt").value});
  confirmScreen();
}

// ─── 4 PUZZLE ────────────────────────────────────────────────────────────────
let pTime=0, pTimer;
function puzzle() {
  const st = loadState();
  if (st?.step==="running") { resumePuzzle(st.data.elapsed||0); return; }
  if (st?.step==="stopped") { showPuzzleResult(st.data.elapsed||0); return; }
  app.innerHTML = `${teamTag()}<h2>Puzzle</h2>
  <p>Složte puzzle co nejrychleji.</p>
  <button onclick="startPuzzle()">Start</button>`;
}
function startPuzzle() { saveState("running",{elapsed:0}); resumePuzzle(0); }
function resumePuzzle(from) {
  pTime = from;
  app.innerHTML = `${teamTag()}<div class="timer"><span id="pt">${fmt(pTime)}</span></div>
  <button onclick="stopPuzzle()">Stop</button>`;
  clearInterval(pTimer);
  pTimer = setInterval(()=>{
    pTime++; saveState("running",{elapsed:pTime});
    const el=document.getElementById("pt");
    if(el) el.textContent=fmt(pTime);
  },1000);
}
function stopPuzzle() { clearInterval(pTimer); saveState("stopped",{elapsed:pTime}); showPuzzleResult(pTime); }
function showPuzzleResult(t) {
  app.innerHTML = `${teamTag()}<h2>${fmt(t)}</h2>
  <button onclick="finishPuzzle()">Hotovo</button>`;
}
function finishPuzzle() { send({station:4,answer:pTime}); confirmScreen(); }

// ─── 5 PLAKÁT ────────────────────────────────────────────────────────────────
function plakat() {
  const st = loadState();
  if (st?.step==="running") { showPlakat(st.data.txt||""); return; }
  app.innerHTML = `${teamTag()}<h2>Plakát</h2>
  <p>Zapište názvy filmů z plakátu.</p>
  <button onclick="startPlakat()">Start</button>`;
}
function startPlakat() { saveState("running",{txt:""}); showPlakat(""); }
function showPlakat(saved) {
  app.innerHTML = `${teamTag()}
  <textarea id="p" placeholder="Filmy...">${saved}</textarea>
  <button onclick="finishPlakat()">Hotovo</button>`;
  document.getElementById("p").addEventListener("input", e => saveState("running",{txt:e.target.value}));
}
function finishPlakat() { send({station:5,answer:document.getElementById("p").value}); confirmScreen(); }

// ─── 6 NUMBER ────────────────────────────────────────────────────────────────
const num = ["_ dalmatinů","Fallout _","Apollo _","_ stupňů Fahrenheita","_ Pilots",
             "_ rozhněvaných mužů","Ocean's _","Hlava _","Maroon _","_ věcí..."];
let ni = 0;
function numberIntro() {
  const st = loadState();
  if (st?.step==="running") { ni=st.data.ni||0; showNum(); return; }
  app.innerHTML = `${teamTag()}<h2>Number</h2>
  <p>Doplň číslo do názvu.</p>
  <button onclick="startNumber()">Start</button>`;
}
function startNumber() { ni=0; saveState("running",{ni:0}); showNum(); }
function showNum() {
  app.innerHTML = `${teamTag()}<div class="progress">${ni+1} / ${num.length}</div>
  <div class="card"><p style="font-size:20px;font-weight:600">${num[ni]}</p></div>
  <input type="number" id="n" placeholder="Číslo..." inputmode="numeric">
  <button onclick="submitNum()">Další →</button>`;
}
function submitNum() {
  send({station:6,question:ni+1,answer:document.getElementById("n").value});
  ni++; saveState("running",{ni});
  if(ni<num.length) showNum(); else confirmScreen();
}

// ─── 7 STÁTY ─────────────────────────────────────────────────────────────────
const geo = [
  {img:'<img src="images/paraguay.png">',opt:['Paraguay','Chile','Peru','Bolívie']},
  {img:'<img src="images/vietnam.png">',opt:['Thajsko','Vietnam','Laos','Kambodža']},
  {img:'<img src="images/japonsko.png">',opt:['Filipíny','Japonsko','Indonésie','Korea']},
  {img:'<img src="images/chile.png">',opt:['Chile','Argentina','Peru','Brazílie']},
  {img:'<img src="images/severni-korea.png">',opt:['Jižní Korea','Čína','Severní Korea','Japonsko']},
  {img:'<img src="images/nizozemsko.png">',opt:['Belgie','Nizozemsko','Německo','Dánsko']},
  {img:'<img src="images/chorvatsko.png">',opt:['Řecko','Chorvatsko','Itálie','Albánie']},
  {img:'<img src="images/novy-zeland.png">',opt:['Austrálie','Nový Zéland','Fidži','Papua']},
  {img:'<img src="images/kuba.png">',opt:['Kuba','Jamajka','Haiti','Bahamy']},
  {img:'<img src="images/gronsko.png">',opt:['Island','Grónsko','Norsko','Kanada']}
];
let gi=0, geoAnswers=[];
function geoIntro() {
  const st = loadState();
  if (st?.step==="running") { gi=st.data.gi||0; geoAnswers=st.data.ans||[]; showGeo(); return; }
  app.innerHTML = `${teamTag()}<h2>Státy</h2>
  <p>Poznej stát podle tvaru na mapě.</p>
  <button onclick="startGeo()">Start</button>`;
}
function startGeo() { gi=0; geoAnswers=[]; saveState("running",{gi:0,ans:[]}); showGeo(); }
function showGeo() {
  const q = geo[gi];
  app.innerHTML = `${teamTag()}<div class="progress">${gi+1} / ${geo.length}</div>
  ${q.img}
  ${q.opt.map(o=>`<button onclick="ansGeo('${o}')">${o}</button>`).join("")}`;
}
function ansGeo(a) {
  geoAnswers.push(a); gi++;
  saveState("running",{gi,ans:geoAnswers});
  if(gi<geo.length) showGeo(); else finishGeo();
}
function finishGeo() {
  app.innerHTML = `${teamTag()}<h2>Hotovo!</h2><button onclick="submitGeo()">Odeslat</button>`;
}
function submitGeo() {
  geoAnswers.forEach((a,i)=>send({station:7,question:i+1,answer:a}));
  confirmScreen();
}

// ─── 8 PŘÍSLOVÍ ──────────────────────────────────────────────────────────────
const prislovi = [
  "images/nekdo-rad-holky-jinej-zas-vdolky.png",
  "images/my-o-vlku-a-vlk-za-dvermi.png",
  "images/muj-dum-muj-hrad.png",
  "images/kovarovic-kobyla-chodi-bosa.png",
  "images/kdyz-ne-po-dobru-tak-po-zlu.png",
  "images/kam-cert-nemuze-nastrci-zenskou.png",
  "images/jedna-vlastovka-jaro-nedela.png",
  "images/co-na-srdci-to-na-jazyku.png",
  "images/co-se-v-mladi-naucis-ve-stari-jako-kdyz-najdes.png",
  "images/bez-prace-nejsou-kolace.png"
];
let pi=0, prisloviAnswers=[];
function prisloviIntro() {
  const st = loadState();
  if (st?.step==="running") { pi=st.data.pi||0; prisloviAnswers=st.data.ans||[]; showPrislovi(); return; }
  app.innerHTML = `${teamTag()}<h2>Přísloví</h2>
  <p>Poznej podle emoji o jaké české přísloví se jedná.</p>
  <button onclick="startPrislovi()">Start</button>`;
}
function startPrislovi() { pi=0; prisloviAnswers=[]; saveState("running",{pi:0,ans:[]}); showPrislovi(); }
function showPrislovi() {
  app.innerHTML = `${teamTag()}<div class="progress">${pi+1} / ${prislovi.length}</div>
  <img src="${prislovi[pi]}">
  <input type="text" id="prInput" placeholder="Zadej přísloví..." autocomplete="off">
  <button onclick="nextPrislovi()">Další →</button>`;
}
function nextPrislovi() {
  prisloviAnswers.push(document.getElementById("prInput").value);
  pi++; saveState("running",{pi,ans:prisloviAnswers});
  if(pi<prislovi.length) showPrislovi(); else finishPrislovi();
}
function finishPrislovi() {
  app.innerHTML = `${teamTag()}<h2>Hotovo!</h2><button onclick="submitPrislovi()">Odeslat</button>`;
}
function submitPrislovi() {
  prisloviAnswers.forEach((a,i)=>send({station:8,question:i+1,answer:a}));
  confirmScreen();
}

// ─── 9 BEZ DOTYKU ────────────────────────────────────────────────────────────
let bdTime=0, bdTimer;
function bezDotyku() {
  const st = loadState();
  if (st?.step==="running") { resumeBD(st.data.elapsed||0); return; }
  if (st?.step==="stopped") { showBDResult(st.data.elapsed||0); return; }
  app.innerHTML = `${teamTag()}<h2>Bez dotyku</h2>
  <p>Pomocí předmětů před sebou napište slovo OLIVA bez dotyku fixy.</p>
  <button onclick="startBD()">Start</button>`;
}
function startBD() { saveState("running",{elapsed:0}); resumeBD(0); }
function resumeBD(from) {
  bdTime = from;
  app.innerHTML = `${teamTag()}<div class="timer"><span id="bdTimer">${fmt(bdTime)}</span></div>
  <button onclick="stopBD()">Stop</button>`;
  clearInterval(bdTimer);
  bdTimer = setInterval(()=>{
    bdTime++; saveState("running",{elapsed:bdTime});
    const el=document.getElementById("bdTimer");
    if(el) el.textContent=fmt(bdTime);
  },1000);
}
function stopBD() { clearInterval(bdTimer); saveState("stopped",{elapsed:bdTime}); showBDResult(bdTime); }
function showBDResult(t) {
  app.innerHTML = `${teamTag()}<h2>${fmt(t)}</h2><button onclick="finishBD()">Hotovo</button>`;
}
function finishBD() { send({station:9,answer:bdTime}); confirmScreen(); }

// ─── 10 VIDEOHRY ─────────────────────────────────────────────────────────────
function videohry() {
  const st = loadState();
  if (st?.step==="running") { showVideohry(st.data.txt||""); return; }
  app.innerHTML = `${teamTag()}<h2>Videohry</h2>
  <p>Rozpoznejte screenshoty her a zadejte odpovědi ve správném pořadí.</p>
  <button onclick="startVideohry()">Start</button>`;
}
function startVideohry() { saveState("running",{txt:""}); showVideohry(""); }
function showVideohry(saved) {
  app.innerHTML = `${teamTag()}
  <textarea id="vgInput" placeholder="hra1, hra2...">${saved}</textarea>
  <button onclick="finishVideohry()">Hotovo</button>`;
  document.getElementById("vgInput").addEventListener("input",e=>saveState("running",{txt:e.target.value}));
}
function finishVideohry() { send({station:10,answer:document.getElementById("vgInput").value}); confirmScreen(); }

// ─── 11 VLAŠTOVKA ────────────────────────────────────────────────────────────
function vlastovka() {
  const st = loadState();
  if (st?.step==="running") { showVlastovka(); return; }
  app.innerHTML = `${teamTag()}<h2>Vlaštovka</h2>
  <p>Složte vlaštovku, která dolétne nejdál. Můžete použít internet.</p>
  <button onclick="startVlastovka()">Začít</button>`;
}
function startVlastovka() { saveState("running"); showVlastovka(); }
function showVlastovka() {
  app.innerHTML = `${teamTag()}<h2>Vlaštovka ✈️</h2>
  <p>Složte a hoďte vlaštovku!</p>
  <button onclick="finishVlastovka()">Hotovo</button>`;
}
function finishVlastovka() { send({station:11,answer:"DONE"}); confirmScreen(); }

// ─── 12 MATEMATIKA ───────────────────────────────────────────────────────────
const mathQ = [
  "V místnosti je 20 lidí a každý s každým si potřese rukou. Ke kolika potřesením rukou dojde?",
  "Jak změříte přesně 4 litry vody, máte-li k dispozici pouze dvě odměrné nádoby o objemu 5 a 3 litry?",
  "Která tři kladná čísla mají stejný součet i součin?",
  "Dvě kachny stojí před dvěma jinými kachnami, dvě stojí za dvěma jinými a dvě vedle dvou jiných. Kolik je kachen dohromady?",
  "Můj otec měl 31 let, když jsem měl já 8. Teď je dvakrát tak starý jako já. Kolik je mi let?",
  "Kolik je 1/2 z 2/3 z 3/4 z 4/5 z 5/6 z 6/7 z 7/8 z 8/9 z 9/10 z 1000?",
  "Je-li tatáž kniha na poličce čtvrtou zleva a šestou zprava, kolik knih je na poličce?",
  "Pokud stojíte 10 metrů od dveří a s každým pohybem snížíte vzdálenost o polovinu, po kolika pohybech se dostanete ke dveřím?",
  "První vlak jede 60 km/hod, druhý 40 km/hod v opačném směru. Jak daleko budou od sebe hodinu před setkáním?",
  "Číslo X zdvojnásobíme, vynásobíme 4, vydělíme 8 a dostaneme X. Jaké je X?"
];
let mI=0;
function matematikaIntro() {
  const st = loadState();
  if (st?.step==="running") { mI=st.data.mI||0; showMath(); return; }
  app.innerHTML = `${teamTag()}<h2>Matematika</h2>
  <p>10 matematických hádanek. Papír je k dispozici. Žádný časový limit.</p>
  <button onclick="startMatematika()">Start</button>`;
}
function startMatematika() { mI=0; saveState("running",{mI:0}); showMath(); }
function showMath() {
  app.innerHTML = `${teamTag()}<div class="progress">${mI+1} / ${mathQ.length}</div>

  <textarea id="mathInput" placeholder="Tvoje odpověď..."></textarea>
  <button onclick="nextMath()">Další →</button>`;
}
function nextMath() {
  send({station:12,question:mI+1,answer:document.getElementById("mathInput").value});
  mI++; saveState("running",{mI});
  if(mI<mathQ.length) showMath(); else finishMath();
}
function finishMath() {
  app.innerHTML = `${teamTag()}<h2>Mega smekám! 🎩</h2>
  <button onclick="confirmScreen()">Hotovo</button>`;
}
