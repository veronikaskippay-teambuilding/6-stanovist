<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teambuilding Game</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Poppins', sans-serif;
  text-align: center;
  padding: 20px;
  background: #f5f5f5 url('https://www.transparenttextures.com/patterns/paper.png');
  color: #1f4bc1;
}

/* CONTAINER */
#app, #start {
  max-width: 460px;
  margin: auto;
}

/* NADPIS */
h2 {
  font-family: 'Luckiest Guy', cursive;
  font-size: 52px;
  margin-bottom: 20px;
  color: #1f4bc1;
  letter-spacing: 2px;
}

/* TEXT */
p {
  font-size: 15px;
  line-height: 1.6;
  font-weight: 300;
  margin-bottom: 25px;
}

/* BUTTON */
button {
  background-color: #1f4bc1;
  color: white;
  border: none;
  padding: 15px 25px;
  border-radius: 40px;
  font-family: 'Poppins';
  font-size: 18px;
  cursor: pointer;
  width: 220px;
  transition: all 0.2s ease;
}

button:hover {
  background-color: #163a97;
  transform: scale(1.05);
}

/* INPUT */
input, textarea {
  width: 90%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin: 12px 0;
  font-family: 'Poppins';
  font-size: 16px;
}

/* IMAGE */
img {
  max-width: 260px;
  margin: 20px 0;
}

/* TEAM NAME */
.team {
  font-size: 13px;
  color: #888;
  margin-bottom: 10px;
}

</style>
</head>

<body>

<div id="start">
<h2>Teambuilding</h2>
<input id="teamInput" placeholder="Zadej název týmu">
<br><br>
<button onclick="saveTeam()">Start</button>
</div>

<div id="app" style="display:none"></div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzVIxT_PPm6GRhmVuHvVA6UlFQI93FdNa7PqMkcAUXQRoOxhiwV59Wzbta9D9VWSO1cFQ/exec";
const params = new URLSearchParams(window.location.search);
const station = params.get("station");
let team = localStorage.getItem("team");

if(team){ startApp(); }

function saveTeam(){
  const t = document.getElementById("teamInput").value;
  if(!t) return;
  localStorage.setItem("team", t);
  team = t;
  startApp();
}

function startApp(){
  document.getElementById("start").style.display="none";
  document.getElementById("app").style.display="block";

  if(!station){
    document.getElementById("app").innerHTML = `
      <h2>Vítejte</h2>
      <p>Naskenujte QR kód stanoviště.</p>
    `;
    return;
  }

  if(station==1) slepec();
  if(station==2) tichaPosta();
  if(station==3) memoryRun();
  if(station==4) puzzle();
  if(station==5) plakat();
  if(station==6) numberGame();
  if(station==7) geoQuiz();
}

function send(data){
  fetch(scriptURL,{
    method:"POST",
    mode:"no-cors",
    body: JSON.stringify({team:team,...data})
  });
}

function confirmScreen(){
  document.getElementById("app").innerHTML = `
    <h2>✅ Hotovo, tohle jste zvládli!</h2>
  `;
}

/* ===== STATIONS ===== */

function slepec(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Slepec</h2>
    <p>Před sebou vidíš obálku, papír a fixy... (zkráceno)</p>
    <button onclick="startSlepec()">Start</button>
  `;
}

function startSlepec(){
  setTimeout(()=>alert("Konec času!"),180000);
  document.getElementById("app").innerHTML = `
    <input type="file" accept="image/*" capture>
    <button onclick="finishPhoto(1)">Hotovo</button>
  `;
}

/* FOTO */
function finishPhoto(s){
  send({station:s, answer:"PHOTO DONE"});
  confirmScreen();
}

function tichaPosta(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Tichá pošta</h2>
    <p>Vidíš před sebou obálku, papír a fixy...</p>
    <button onclick="startPhoto(2)">Start</button>
  `;
}

function startPhoto(s){
  document.getElementById("app").innerHTML = `
    <input type="file" accept="image/*" capture>
    <button onclick="finishPhoto(${s})">Hotovo</button>
  `;
}

function memoryRun(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Memory run</h2>
    <p>Dva hráči z vašeho týmu poběží ke krabici...</p>
    <button onclick="startMemory()">Start</button>
  `;
}

function startMemory(){
  setTimeout(()=>alert("Konec času!"),240000);
  document.getElementById("app").innerHTML = `
    <textarea id="m"></textarea>
    <button onclick="finishMemory()">Hotovo</button>
  `;
}

function finishMemory(){
  send({station:3, answer:document.getElementById("m").value});
  confirmScreen();
}

let startTime;

function puzzle(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Puzzle</h2>
    <p>Jeden z vašeho týmu má zavázané oči...</p>
    <button onclick="startTime=Date.now()">Start</button>
    <button onclick="finishPuzzle()">Hotovo</button>
  `;
}

function finishPuzzle(){
  const sec = Math.floor((Date.now()-startTime)/1000);
  send({station:4, answer:sec});
  confirmScreen();
}

function plakat(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Plakát</h2>
    <textarea id="p"></textarea>
    <button onclick="finishPlakat()">Odeslat</button>
  `;
}

function finishPlakat(){
  send({station:5, answer:document.getElementById("p").value});
  confirmScreen();
}

/* NUMBER */
const numQ = ["_ dalmatinů","Fallout _","Apollo _","_ stupňů Fahrenheita","_ Pilots","_ rozhněvaných mužů","Ocean's _","Hlava _","Maroon _","_ věcí..."];
let nI=0;

function numberGame(){
  nI=0;
  showNum();
}

function showNum(){
  document.getElementById("app").innerHTML = `
    <h2>${nI+1}/10</h2>
    <p>${numQ[nI]}</p>
    <input id="a">
    <button onclick="submitNum()">Další</button>
  `;
}

function submitNum(){
  send({station:6, question:nI+1, answer:document.getElementById("a").value});
  nI++;
  if(nI<10) showNum();
  else confirmScreen();
}

/* GEO */
const geo = [
{img:'images/paraguay.png',opt:['Paraguay','Chile','Peru','Bolívie']},
{img:'images/vietnam.png',opt:['Thajsko','Vietnam','Laos','Kambodža']},
{img:'images/japonsko.png',opt:['Filipíny','Japonsko','Indonésie','Korea']},
{img:'images/chile.png',opt:['Chile','Argentina','Peru','Brazílie']},
{img:'images/severni-korea.png',opt:['Jižní Korea','Čína','Severní Korea','Japonsko']},
{img:'images/nizozemsko.png',opt:['Belgie','Nizozemsko','Německo','Dánsko']},
{img:'images/chorvatsko.png',opt:['Řecko','Chorvatsko','Itálie','Albánie']},
{img:'images/novy-zeland.png',opt:['Austrálie','Nový Zéland','Fidži','Papua']},
{img:'images/kuba.png',opt:['Kuba','Jamajka','Haiti','Bahamy']},
{img:'images/gronsko.png',opt:['Island','Grónsko','Norsko','Kanada']}
];

let g=0;
let lock=false;

function geoQuiz(){
  renderGeo();
}

function renderGeo(){
  let q=geo[g];
  document.getElementById("app").innerHTML = `
    <h2>${g+1}/10</h2>
    <img src="${q.imgswerGeo('${o}')">${o}</button>`).join("")}
  `;
}

function answerGeo(a){
  if(lock) return;
  lock=true;

  send({station:7, question:g+1, answer:a});

  setTimeout(()=>{
    lock=false;
    g++;
    if(g<10) renderGeo();
    else confirmScreen();
  },300);
}

</script>

</body>
</html>
``
