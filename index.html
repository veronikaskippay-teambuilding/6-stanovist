<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teambuilding Game</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  text-align: center;
  padding: 20px;
  background: #f5f5f5 url('https://www.transparenttextures.com/patterns/paper.png');
  color: #1f4bc1;
}

#app, #start {
  max-width: 460px;
  margin: auto;
}

h2 {
  font-family: 'Luckiest Guy', cursive;
  font-size: 48px;
  margin-bottom: 20px;
}

p {
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 25px;
}

button {
  background-color: #1f4bc1;
  color: white;
  border: none;
  padding: 15px 25px;
  border-radius: 40px;
  font-size: 18px;
  cursor: pointer;
  width: 220px;
}

input, textarea {
  width: 90%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin: 12px 0;
  font-family: 'Poppins';
  font-size: 16px;
}

img {
  max-width: 260px;
  margin: 20px 0;
}

.team {
  font-size: 13px;
  color: #888;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="start">
<h2>Teambuilding</h2>
<input id="teamInput" placeholder="Název týmu">
<br><br>
<button onclick="saveTeam()">Start</button>
</div>

<div id="app" style="display:none"></div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzVIxT_PPm6GRhmVuHvVA6UlFQI93FdNa7PqMkcAUXQRoOxhiwV59Wzbta9D9VWSO1cFQ/exec";
const params = new URLSearchParams(window.location.search);
const station = params.get("station");
let team = localStorage.getItem("team");

if(team){ startApp(); }

function saveTeam(){
  const t = document.getElementById("teamInput").value;
  if(!t) return;
  localStorage.setItem("team", t);
  team = t;
  startApp();
}

function startApp(){
  document.getElementById("start").style.display="none";
  document.getElementById("app").style.display="block";

  if(!station){
    document.getElementById("app").innerHTML = `<h2>Vítejte</h2><p>Naskenujte QR kód stanoviště.</p>`;
    return;
  }

  if(station==1) slepec();
  if(station==2) tichaPosta();
  if(station==3) memoryRun();
  if(station==4) puzzle();
  if(station==5) plakat();
  if(station==6) numberGame();
  if(station==7) geoQuiz();
}

function send(data){
  fetch(scriptURL,{
    method:"POST",
    mode:"no-cors",
    body: JSON.stringify({team:team,...data})
  });
}

function confirmScreen(){
  document.getElementById("app").innerHTML = `
    <h2>✅ Hotovo, tohle jste zvládli!</h2>
    <p>Pokračujte na další stanoviště.</p>
  `;
}

////////////////////////
// 1 SLEPEC ✅
////////////////////////

let timerInterval;

// INSTRUKCE
function slepec(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Slepec</h2>
    <p>
    Před sebou vidíš obálku, papír a fixy. Jeden člověk z vašeho týmu bude kreslit, ostatní budou radit. V obálce je obrázek, ten se ten co kreslí snaží co nejpřesněji překreslit podle instrukcí od zbytku týmu. Co kreslí nikdy nevidí obrázek. Máte časový limit 3 minuty, během nich musíte obrázek také vyfotit.
    </p>
    <button onclick="startSlepec()">Start</button>
  `;
}

// START + TIMER + UI
function startSlepec(){

  let time = 240; // 4 minuty

  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>⏱ Čas: <span id="timer">4:00</span></h2>

    <input id="photoInput" type="file" accept="image/*" capture style="display:none">

    <button onclick="openCamera()">Vyfotit</button>
    <br><br>
    <button onclick="finishSlepec()">Hotovo</button>
  `;

  timerInterval = setInterval(() => {

    time--;

    let min = Math.floor(time / 60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
      min + ":" + (sec < 10 ? "0" + sec : sec);

    if(time <= 0){
      clearInterval(timerInterval);
      alert("Konec času!");
    }

  }, 1000);
}

// OTEVŘENÍ FOŤÁKU
function openCamera(){
  document.getElementById("photoInput").click();
}

// ODESLÁNÍ
function finishSlepec(){
  clearInterval(timerInterval);

  send({
    station: 1,
    answer: "PHOTO DONE"
  });

  confirmScreen();
}

////////////////////////////////
// 2 TICHÁ POŠTA
////////////////////////////////
function tichaPosta(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Tichá pošta</h2>
    <p>Vidíš před sebou obálku, papír a fixy. Stoupnete si všichni za sebe jako vláček, tak že vidíte na záda svého spoluhráče. Obálku otevírá a vidí pouze jeden z týmu, ten co je na konci. Každý má jeden list papíru a fixu. Poslední s obálkou kreslí na papír, který má položený na zádech spoluhráče před sebou. Pokračuje to dál až k prvnímu ve vláčku, který má výsledný obrázek. Ten je potřeba vyfotit.</p>
    <button onclick="startPhoto(2)">Start</button>
  `;
}

function startPhoto(s){
  document.getElementById("app").innerHTML = `
    <input type="file" accept="image/*" capture>
    <button onclick="finishPhoto(${s})">Hotovo</button>
  `;
}

function finishPhoto(s){
  send({station:s, answer:"PHOTO DONE"});
  confirmScreen();
}

////////////////////////////////
// 3 MEMORY
////////////////////////////////
function memoryRun(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Memory run</h2>
    <p>Dva hráči z vašeho týmu poběží ke krabici, kde jsou schované předměty, kdy se snažíte zapamatovat co nejvíc z nich. Dvojice běží zpět k týmu, který zapisuje předměty. Máte na to časový limit 4 minuty.</p>
    <button onclick="startMemory()">Start</button>
  `;
}

function startMemory(){
  setTimeout(()=>alert("Konec času!"),240000);
  document.getElementById("app").innerHTML = `
    <textarea id="m"></textarea>
    <button onclick="finishMemory()">Hotovo</button>
  `;
}

function finishMemory(){
  send({station:3, answer:document.getElementById("m").value});
  confirmScreen();
}

////////////////////////////////
// 4 PUZZLE
////////////////////////////////
let startTime;

function puzzle(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Puzzle</h2>
    <p>Jeden z vašeho týmu má zavázané oči a podle návodů od zbytku týmu se snaží co nejrychleji složit puzzle.</p>
    <button onclick="startTime=Date.now()">Start</button>
    <button onclick="finishPuzzle()">Hotovo</button>
  `;
}

function finishPuzzle(){
  const sec = Math.floor((Date.now()-startTime)/1000);
  send({station:4, answer:sec});
  confirmScreen();
}

////////////////////////////////
// 5 PLAKÁT
////////////////////////////////
function plakat(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Plakát</h2>
    <p>Máte před sebou obálku, která obsahuje 10 plakátů očíslované 1 až 10. Do otevřeného pole pište jaký si myslíte, že se pod plakátem skrývá film. Pište je postupně hned za sebe, pokud nevíte a nechcete tipovat, napište nevíme.</p>
    <textarea id="p"></textarea>
    <button onclick="finishPlakat()">Odeslat</button>
  `;
}

function finishPlakat(){
  send({station:5, answer:document.getElementById("p").value});
  confirmScreen();
}
</script>

</body>
</html>
