<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teambuilding</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>
body {
  font-family: Poppins;
  text-align: center;
  padding: 20px;
  background: #f5f5f5;
  color:#1f4bc1;
}
h2 {
  font-family: 'Luckiest Guy';
  font-size: 42px;
}
button {
  background:#1f4bc1;
  color:white;
  border:none;
  border-radius:30px;
  padding:12px;
  width:220px;
}
textarea,input { width:90%; padding:10px; }
.team {color:gray;font-size:13px;}
img {max-width:260px;}
</style>
</head>
<body>

<div id="start">
<h2>Teambuilding</h2>
<input id="teamInput" placeholder="Název týmu">
<br><br>
<button onclick="saveTeam()">Start</button>
</div>

<div id="app"></div>

<script>
const scriptURL="https://script.google.com/macros/s/AKfycbzVIxT_PPm6GRhmVuHvVA6UlFQI93FdNa7PqMkcAUXQRoOxhiwV59Wzbta9D9VWSO1cFQ/exec";
let team=localStorage.getItem("team");
const station=new URLSearchParams(window.location.search).get("station");

if(team){startApp();}

function saveTeam(){
  team=document.getElementById("teamInput").value;
  localStorage.setItem("team",team);
  startApp();
}

function startApp(){
  document.getElementById("start").style.display="none";

  if(station==1)slepec();
  if(station==2)tichaPosta();
  if(station==3)memoryRun();
  if(station==4)puzzle();
  if(station==5)plakat();
  if(station==6)numberIntro();
  if(station==7)geoIntro();
  if(station==8) prisloviIntro();
  if(station==9) bezDotyku();
  if(station==10) videohry();
  if(station==11) vlastovka();
  if(station==12) matematikaIntro();

}

function send(data){
  fetch(scriptURL,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({team:team,...data})
  });
}

function confirmScreen(){
  document.getElementById("app").innerHTML=`<h2>✅ Hotovo, tohle jste zvládli!</h2>`;
}

//////////////// SLEPEC
let slepecTimer;
function slepec(){
  app.innerHTML=`<h3 class="team">Tým: ${team}</h3>
  <h2>Slepec</h2>
  <p>Před sebou vidíš obálku, papír...</p>
  <button onclick="startSlepec()">Start</button>`;
}
function startSlepec(){
  let t=240;
  app.innerHTML=`<h2>⏱ <span id="t">4:00</span></h2>
  <input id="f" type="file" accept="image/*" capture hidden>
  <button onclick="f.click()">Vyfotit</button><br><br>
  <button onclick="finishSlepec()">Hotovo</button>`;
  slepecTimer=setInterval(()=>{
    t--;
    let m=Math.floor(t/60);
    let s=t%60;
    document.getElementById("t").innerText=m+":"+(s<10?"0"+s:s);
    if(t<=0){clearInterval(slepecTimer);alert("Konec");}
  },1000);
}
function finishSlepec(){
  clearInterval(slepecTimer);
  send({station:1,answer:"PHOTO"});
  confirmScreen();
}

//////////////// TICHÁ POŠTA
function tichaPosta(){
  app.innerHTML=`<h3 class="team">${team}</h3>
  <h2>Tichá pošta</h2>
  <p>Kreslení na zádech spoluhráče.</p>
  <button onclick="startTP()">Start</button>`;
}
function startTP(){
  app.innerHTML=`<input type="file" accept="image/*" capture>
  <button onclick="finishTP()">Hotovo</button>`;
}
function finishTP(){
  send({station:2,answer:"PHOTO"});
  confirmScreen();
}

//////////////// MEMORY
let memTimer;
function memoryRun(){
  app.innerHTML=`<h3 class="team">${team}</h3>
  <h2>Memory run</h2>
  <p>Zapamatujte si předměty (4 min)</p>
  <button onclick="startMemory()">Start</button>`;
}
function startMemory(){
  let t=240;
  app.innerHTML=`<h2>⏱ <span id="mt">4:00</span></h2>
  <textarea id="txt"></textarea>
  <button onclick="finishMemory()">Hotovo</button>`;
  memTimer=setInterval(()=>{
    t--;
    let m=Math.floor(t/60);
    let s=t%60;
    mt.innerText=m+":"+(s<10?"0"+s:s);
    if(t<=0){clearInterval(memTimer);}
  },1000);
}
function finishMemory(){
  clearInterval(memTimer);
  send({station:3,answer:txt.value});
  confirmScreen();
}

//////////////// PUZZLE
let pTime=0,pTimer;
function puzzle(){
  app.innerHTML=`<h3>${team}</h3>
  <h2>Puzzle</h2>
  <p>Složte puzzle co nejrychleji</p>
  <button onclick="startPuzzle()">Start</button>`;
}
function startPuzzle(){
  pTime=0;
  app.innerHTML=`<h2><span id="pt">0:00</span></h2>
  <button onclick="stopPuzzle()">Stop</button>`;
  pTimer=setInterval(()=>{
    pTime++;
    pt.innerText=Math.floor(pTime/60)+":"+((pTime%60<10)?"0":"")+pTime%60;
  },1000);
}
function stopPuzzle(){
  clearInterval(pTimer);
  app.innerHTML=`<h2>${pt.innerText}</h2>
  <button onclick="finishPuzzle()">Hotovo</button>`;
}
function finishPuzzle(){
  send({station:4,answer:pTime});
  confirmScreen();
}

//////////////// PLAKÁT
function plakat(){
  app.innerHTML=`<h3>${team}</h3>
  <h2>Plakát</h2>
  <p>Zapište názvy filmů</p>
  <button onclick="startPlakat()">Start</button>`;
}
function startPlakat(){
  app.innerHTML=`<textarea id="p"></textarea>
  <button onclick="finishPlakat()">Hotovo</button>`;
}
function finishPlakat(){
  send({station:5,answer:p.value});
  confirmScreen();
}

//////////////// NUMBER
const num=["_ dalmatinů","Fallout _","Apollo _","_ stupňů Fahrenheita","_ Pilots","_ rozhněvaných mužů","Ocean's _","Hlava _","Maroon _","_ věcí..."];
let ni=0;
function numberIntro(){
  app.innerHTML=`<h3>${team}</h3>
  <h2>Number</h2>
  <p>Doplň číslo</p>
  <button onclick="startNumber()">Start</button>`;
}
function startNumber(){ni=0;showNum();}
function showNum(){
  app.innerHTML=`<h2>${ni+1}/10</h2>
  <p>${num[ni]}</p>
  <input type="number" id="n">
  <button onclick="submitNum()">Další</button>`;
}
function submitNum(){
  send({station:6,question:ni+1,answer:n.value});
  ni++; if(ni<num.length) showNum(); else confirmScreen();
}

////////////////////////
// STATION 7 - STÁTY
////////////////////////

const geo = [
{img:'<img src="images/paraguay.png">',opt:['Paraguay','Chile','Peru','Bolívie']},
{img:'<img src="images/vietnam.png">',opt:['Thajsko','Vietnam','Laos','Kambodža']},
{img:'<img src="images/japonsko.png">',opt:['Filipíny','Japonsko','Indonésie','Korea']},
{img:'<img src="images/chile.png">',opt:['Chile','Argentina','Peru','Brazílie']},
{img:'<img src="images/severni-korea.png">',opt:['Jižní Korea','Čína','Severní Korea','Japonsko']},
{img:'<img src="images/nizozemsko.png">',opt:['Belgie','Nizozemsko','Německo','Dánsko']},
{img:'<img src="images/chorvatsko.png">',opt:['Řecko','Chorvatsko','Itálie','Albánie']},
{img:'<img src="images/novy-zeland.png">',opt:['Austrálie','Nový Zéland','Fidži','Papua']},
{img:'<img src="images/kuba.png">',opt:['Kuba','Jamajka','Haiti','Bahamy']},
{img:'<img src="images/gronsko.png">',opt:['Island','Grónsko','Norsko','Kanada']}
];

let gi = 0;
let answers = [];

// ✅ ÚVOD
function geoIntro(){
  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Státy</h2>
    <p>Podle obrázku urči co je to za stát.</p>
    <button onclick="startGeo()">Start</button>
  `;
}

// ✅ START
function startGeo(){
  gi = 0;
  answers = [];
  showGeo();
}

// ✅ OTÁZKA
function showGeo(){
  let q = geo[gi];

  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>${gi+1}/10</h2>

    ${q.img}

    <br><br>

    ${q.opt.map(o => `
      <button onclick="ansGeo('${o}')">${o}</button>
    `).join("")}
  `;
}

// ✅ ODPOVĚĎ
function ansGeo(a){
  answers.push(a);
  gi++;

  if(gi < geo.length){
    showGeo();
  } else {
    finishGeo();
  }
}

// ✅ KONEC
function finishGeo(){
  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Hotovo</h2>
    <p>Dokončili jste kvíz.</p>
    <button onclick="submitGeo()">Hotovo</button>
  `;
}

// ✅ ODESLÁNÍ
function submitGeo(){
  answers.forEach((a,i)=>
    send({station:7,question:i+1,answer:a})
  );
  confirmScreen();
}

////////////////////////
// 8 PŘÍSLOVÍ ✅
////////////////////////

const prislovi = [
"images/nekdo-rad-holky-jinej-zas-vdolky.png",
"images/my-o-vlku-a-vlk-za-dvermi.png",
"images/muj-dum-muj-hrad.png",
"images/kovarovic-kobyla-chodi-bosa.png",
"images/kdyz-ne-po-dobru-tak-po-zlu.png",
"images/kam-cert-nemuze-nastrci-zenskou.png",
"images/jedna-vlastovka-jaro-nedela.png",
"images/co-na-srdci-to-na-jazyku.png",
"images/co-se-v-mladi-naucis-ve-stari-jako-kdyz-najdes.png",
"images/bez-prace-nejsou-kolace.png"
];

let pi = 0;
let prisloviAnswers = [];

// ÚVOD
function prisloviIntro(){
  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Přísloví</h2>
    <p>Poznej podle emoji o jaké české přísloví se jedná.</p>
    <button onclick="startPrislovi()">Start</button>
  `;
}

// START
function startPrislovi(){
  pi = 0;
  prisloviAnswers = [];
  showPrislovi();
}

// OTÁZKA
function showPrislovi(){
  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>${pi+1}/10</h2>

    <img src="${prislovi[pi]}">

    <input id="prInput" placeholder="Zadej přísloví">

    <button onclick="nextPrislovi()">Další</button>
  `;
}

// DALŠÍ
function nextPrislovi(){
  prisloviAnswers.push(document.getElementById("prInput").value);
  pi++;

  if(pi < prislovi.length){
    showPrislovi();
  } else {
    finishPrislovi();
  }
}

// KONEC
function finishPrislovi(){
  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <button onclick="submitPrislovi()">Hotovo</button>
  `;
}

// ODESLÁNÍ
function submitPrislovi(){
  prisloviAnswers.forEach((a,i)=>
    send({station:8,question:i+1,answer:a})
  );
  confirmScreen();
}

////////////////////////
// 9 BEZ DOTYKU ✅
////////////////////////

let bdTime = 0;
let bdTimer;

// ÚVOD
function bezDotyku(){
  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Bez dotyku</h2>
    <p>Pomocí předmětů před sebou musíte napsat slovo OLIVA bez dotyku fixy.</p>
    <button onclick="startBD()">Start</button>
  `;
}

// START
function startBD(){
  bdTime = 0;

  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2> <span id="bdTimer">0:00</span></h2>
    <button onclick="stopBD()">Stop</button>
  `;

  bdTimer = setInterval(()=>{
    bdTime++;

    let min = Math.floor(bdTime / 60);
    let sec = bdTime % 60;

    document.getElementById("bdTimer").innerText =
      min + ":" + (sec < 10 ? "0" + sec : sec);

  },1000);
}

// STOP
function stopBD(){
  clearInterval(bdTimer);

  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>${formatTime(bdTime)}</h2>
    <button onclick="finishBD()">Hotovo</button>
  `;
}

// ODESLÁNÍ
function finishBD(){
  send({station:9,answer:bdTime});
  confirmScreen();
}

////////////////////////
// 10 VIDEOHRY ✅
////////////////////////

// ÚVOD
function videohry(){
  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Videohry</h2>
    <p>Rozpoznat screenshoty a zadat odpovědi ve správném pořadí.</p>
    <button onclick="startVideohry()">Start</button>
  `;
}

// START
function startVideohry(){
  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <textarea id="vgInput" placeholder="hra1, hra2..."></textarea>
    <button onclick="finishVideohry()">Hotovo</button>
  `;
}

// ODESLÁNÍ
function finishVideohry(){
  send({
    station:10,
    answer: document.getElementById("vgInput").value
  });
  confirmScreen();
} 

////////////////////////
// 11 VLAŠTOVKA ✅
////////////////////////

function vlastovka(){
  app.innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Vlaštovka</h2>
    <p>Složit vlaštovku, která dolétne nejdál. Můžete využít internet.</p>
    <button onclick="finishVlastovka()">Hotovo</button>
  `;
}

function finishVlastovka(){
  send({station:11,answer:"DONE"});
  confirmScreen();
}  

////////////////////////
// 12 MATEMATIKA ✅
////////////////////////

const mathQ = [
"V místnosti je 20 lidí a každý s každým si potřese rukou. Ke kolika potřesením rukou dojde?",
"Jak změříte přesně 4 litry vody, máte-li k dispozici pouze dvě odměrné nádoby o objemu 5 a 3 litry?",
"Která tři kladná čísla mají stejný součet i součin?",
"Dvě kachny stojí před dvěma jinými kachnami, dvě stojí za dvěma jinými a dvě vedle dvou jiných. Kolik je kachen dohromady?",
"Můj otec měl 31 let, když jsem měl já 8. Teď dvakrát tak starý jako já. Kolik je mi let?",
"Kolik je 1/2 z 2/3 z 3/4 z 4/5 z 5/6 z 6/7 z 7/8 z 8/9 z 9/10 z 1000?",
"Je-li tatáž kniha na poličce čtvrtou zleva a šestou zprava, kolik knih je na poličce?",
"Pokud stojíte 10 metrů od dveří a s každým pohybem směrem k nim snížíte vzdálenost o polovinu, po kolika pohybech se dostanete ke dveřím?",
"První vlak jede z bodu A do bodu B konstantní rychlostí 60 km/hod, druhý z bodu B do bodu A konstantní rychlostí 40 km/hod. Jak daleko budou vlaky od sebe vzdáleny hodinu před tím, než se setkají, za předpokladu, že ani jeden z nich nezastaví?",
"Číslo X zdvojnásobíme, poté výsledek vynásobíme číslem 4, následně vydělíme číslem 8 a dostaneme opět číslo X. Jaké je X číslo?"
];

let mI = 0;

// ✅ INSTRUKCE
function matematikaIntro(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>Matematika</h2>
    <p>
    Čeká na tebe 10 matematických hádanek. Vedle máš papíry, kam si můžeš psát a není zde časový limit. Hodně štěstí!
    </p>
    <button onclick="startMatematika()">Start</button>
  `;
}

// ✅ START
function startMatematika(){
  mI = 0;
  showMath();
}

// ✅ ZOBRAZENÍ OTÁZKY
function showMath(){
  document.getElementById("app").innerHTML = `
    <h3 class="team">Tým: ${team}</h3>
    <h2>${mI+1}/10</h2>
    <p>${mathQ[mI]}</p>
    <textarea id="mathInput" placeholder="Zapiš odpověď"></textarea>
    <button onclick="nextMath()">Další</button>
  `;
}

// ✅ DALŠÍ OTÁZKA / KONEC
function nextMath(){

  const val = document.getElementById("mathInput").value;

  send({
    station: 12,
    question: mI + 1,
    answer: val
  });

  mI++;

  if(mI < mathQ.length){
    showMath();
  } else {
    finishMath();
  }
}

// ✅ KONEC → HOTOVO
function finishMath(){
  document.getElementById("app").innerHTML = `
    <h2>Hotovo!</h2>
    <p>Well done a smekám před vámi.</p>
    <button onclick="confirmScreen()">Hotovo</button>
  `;
}  
  
</script>
</body>
</html>
