<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teambuilding Game</title>

<style>
body { font-family: Arial; text-align:center; padding:20px; }
button { padding:12px; margin:10px; width:230px; }
textarea { width:90%; height:100px; }
img { max-width:300px; margin:20px 0; }
</style>
</head>

<body>

<div id="start">
<h2>Zadej název týmu</h2>
<input id="teamInput" placeholder="Název týmu">
<br><br>
<button onclick="saveTeam()">Start</button>
</div>

<div id="app" style="display:none"></div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzVIxT_PPm6GRhmVuHvVA6UlFQI93FdNa7PqMkcAUXQRoOxhiwV59Wzbta9D9VWSO1cFQ/exec";

const params = new URLSearchParams(window.location.search);
const station = params.get("station");
let team = localStorage.getItem("team");

// ===== init =====
if(team){ startApp(); }

function saveTeam(){
  const t = document.getElementById("teamInput").value;
  if(!t) return;
  localStorage.setItem("team", t);
  team = t;
  startApp();
}

function startApp(){
  document.getElementById("start").style.display="none";
  document.getElementById("app").style.display="block";

  if(!station){
    showHome();
    return;
  }

  if(station==1) slepec();
  if(station==2) tichaPosta();
  if(station==3) memoryRun();
  if(station==4) puzzle();
  if(station==5) plakat();
  if(station==6) numberGame();
  if(station==7) geoQuiz();
}

// ===== HELPERS =====
function send(data){
  fetch(scriptURL,{
    method:"POST",
    mode:"no-cors",
    body: JSON.stringify({team:team,...data})
  });
}

function confirmScreen(){
  document.getElementById("app").innerHTML = `
    <h2>✅ Hotovo!</h2>
    <p>Odpověď byla odeslána.</p>
    <p>Pokračujte na další stanoviště.</p>
  `;
}

// ===== HOME =====
function showHome(){
  document.getElementById("app").innerHTML = `
    <h2>Vítejte 🎉</h2>
    <p>Naskenujte QR kód stanoviště.</p>
  `;
}

// ===== STATION 1 =====
function slepec(){
  document.getElementById("app").innerHTML = `
    <h2>Slepec</h2>
    <p>Jeden kreslí, ostatní radí. Máte 3 minuty.</p>
    <button onclick="startSlepec()">Start</button>
  `;
}

function startSlepec(){
  setTimeout(()=>alert("Konec času!"),180000);
  document.getElementById("app").innerHTML = `
    <h2>Fotografujte výsledek</h2>
    <input type="file" accept="image/*" capture>
    <button onclick="finishPhoto(1)">Hotovo</button>
  `;
}

// ===== STATION 2 =====
function tichaPosta(){
  document.getElementById("app").innerHTML = `
    <h2>Tichá pošta</h2>
    <p>Kreslení na zádech spoluhráče.</p>
    <button onclick="startPhoto(2)">Start</button>
  `;
}

function startPhoto(s){
  document.getElementById("app").innerHTML = `
    <h2>Vyfoťte výsledek</h2>
    <input type="file" accept="image/*" capture>
    <button onclick="finishPhoto(${s})">Hotovo</button>
  `;
}

function finishPhoto(s){
  send({station:s, answer:"PHOTO DONE"});
  confirmScreen();
}

// ===== STATION 3 =====
function memoryRun(){
  document.getElementById("app").innerHTML = `
    <h2>Memory run</h2>
    <p>Zapamatování předmětů (4 min).</p>
    <button onclick="startMemory()">Start</button>
  `;
}

function startMemory(){
  setTimeout(()=>alert("Konec času!"),240000);
  document.getElementById("app").innerHTML = `
    <textarea id="m"></textarea>
    <button onclick="finishMemory()">Hotovo</button>
  `;
}

function finishMemory(){
  send({station:3, answer:document.getElementById("m").value});
  confirmScreen();
}

// ===== STATION 4 =====
let startTime;
function puzzle(){
  document.getElementById("app").innerHTML = `
    <h2>Puzzle</h2>
    <p>Složte puzzle co nejrychleji</p>
    <button onclick="startTime=Date.now()">Start</button>
    <button onclick="finishPuzzle()">Hotovo</button>
  `;
}

function finishPuzzle(){
  const sec = Math.floor((Date.now()-startTime)/1000);
  send({station:4, answer:sec});
  confirmScreen();
}

// ===== STATION 5 =====
function plakat(){
  document.getElementById("app").innerHTML = `
    <h2>Plakát</h2>
    <textarea id="p"></textarea>
    <button onclick="finishPlakat()">Odeslat</button>
  `;
}

function finishPlakat(){
  send({station:5, answer:document.getElementById("p").value});
  confirmScreen();
}

// ===== STATION 6 =====
const numQ = [
"_ dalmatinů","Fallout _","Apollo _","_ stupňů Fahrenheita",
"_ Pilots","_ rozhněvaných mužů","Ocean's _",
"Hlava _","Maroon _","_ věcí, které na tobě nesnáším"
];

let nI=0;

function numberGame(){ showNum(); }

function showNum(){
  document.getElementById("app").innerHTML = `
    <h2>${nI+1}/10</h2>
    <p>${numQ[nI]}</p>
    <input id="a">
    <button onclick="submitNum()">Další</button>
  `;
}

function submitNum(){
  send({station:6, question:nI+1, answer:document.getElementById("a").value});
  nI++;
  if(nI<10) showNum();
  else confirmScreen();
}

// ===== STATION 7 GEO =====
const geo = [
{img:'images/paraguay.png',opt:['Paraguay','Chile','Peru','Bolívie']},
{img:'images/vietnam.png',opt:['Thajsko','Vietnam','Laos','Kambodža']},
{img:'images/japonsko.png',opt:['Filipíny','Japonsko','Indonésie','Korea']},
{img:'images/chile.png',opt:['Chile','Argentina','Peru','Brazílie']},
{img:'images/severni-korea.png',opt:['Jižní Korea','Čína','Severní Korea','Japonsko']},
{img:'images/nizozemsko.png',opt:['Belgie','Nizozemsko','Německo','Dánsko']},
{img:'images/chorvatsko.png',opt:['Řecko','Chorvatsko','Itálie','Albánie']},
{img:'images/novy-zeland.png',opt:['Austrálie','Nový Zéland','Fidži','Papua']},
{img:'images/kuba.png',opt:['Kuba','Jamajka','Haiti','Bahamy']},
{img:'images/gronsko.png',opt:['Island','Grónsko','Norsko','Kanada']}
];

let g=0;
let lock=false;

function geoQuiz(){ renderGeo(); }

function renderGeo(){
  let q = geo[g];
  document.getElementById("app").innerHTML = `
    <h2>${g+1}/10</h2>
    <img src="${q.imgopt.map(o=>`<button onclick="answerGeo('${o}')">${o}</button>`).join("")}
  `;
}

function answerGeo(a){
  if(lock) return;
  lock=true;

  send({station:7, question:g+1, answer:a});

  setTimeout(()=>{
    lock=false;
    g++;
    if(g<10) renderGeo();
    else confirmScreen();
  },300);
}
</script>

</body>
</html>
