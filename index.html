<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teambuilding Game</title>

<style>
body { font-family: Arial; text-align:center; padding:20px; }
button { padding:12px; margin:10px; width:230px; }
textarea { width:90%; height:100px; }
img { max-width:300px; margin:20px 0; }
</style>
</head>

<body>

<div id="start">
<h2>Zadej název týmu</h2>
<input id="teamInput" placeholder="Název týmu">
<br><br>
<button onclick="saveTeam()">Start</button>
</div>

<div id="app" style="display:none"></div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzVIxT_PPm6GRhmVuHvVA6UlFQI93FdNa7PqMkcAUXQRoOxhiwV59Wzbta9D9VWSO1cFQ/exec";
const params = new URLSearchParams(window.location.search);
const station = params.get("station");
let team = localStorage.getItem("team");

if(team){ startApp(); }

function saveTeam(){
  const t = document.getElementById("teamInput").value;
  if(!t) return;
  localStorage.setItem("team", t);
  team = t;
  startApp();
}

function startApp(){
  document.getElementById("start").style.display="none";
  document.getElementById("app").style.display="block";

  if(!station){
    document.getElementById("app").innerHTML = `
      <h2>Vítejte 🎉</h2>
      <p>Naskenujte QR kód stanoviště.</p>
    `;
    return;
  }

  if(station==1) slepec();
  if(station==2) tichaPosta();
  if(station==3) memoryRun();
  if(station==4) puzzle();
  if(station==5) plakat();
  if(station==6) numberGame();
  if(station==7) geoQuiz();
}

// ===== SEND =====
function send(data){
  fetch(scriptURL,{
    method:"POST",
    mode:"no-cors",
    body: JSON.stringify({team:team,...data})
  });
}

// ===== CONFIRM =====
function confirmScreen(){
  document.getElementById("app").innerHTML = `
    <h2>✅ Hotovo, tohle jste zvládli!</h2>
    <p>Pokračujte na další stanoviště.</p>
  `;
}

//////////////////////////
// STATION 1 - SLEPEC
//////////////////////////
function slepec(){
  document.getElementById("app").innerHTML = `
    <h2>Slepec</h2>
    <p>Před sebou vidíš obálku, papír a fixy. Jeden člověk z vašeho týmu bude kreslit, ostatní budou radit. V obálce je obrázek, ten se ten co kreslí snaží co nejpřesněji překreslit podle instrukcí od zbytku týmu. Co kreslí nikdy nevidí obrázek. Máte časový limit 3 minuty, během nich musíte obrázek také vyfotit.</p>
    <button onclick="startSlepec()">Start</button>
  `;
}

function startSlepec(){
  setTimeout(()=>alert("Konec času!"),180000);
  document.getElementById("app").innerHTML = `
    <h3>Vyfoťte výsledek</h3>
    <input type="file" accept="image/*" capture>
    <button onclick="finishPhoto(1)">Hotovo</button>
  `;
}

//////////////////////////
// STATION 2 - TICHÁ POŠTA
//////////////////////////
function tichaPosta(){
  document.getElementById("app").innerHTML = `
    <h2>Tichá pošta</h2>
    <p>Vidíš před sebou obálku, papír a fixy. Stoupnete si všichni za sebe jako vláček, tak že vidíte na záda svého spoluhráče. Obálku otevírá a vidí pouze jeden z týmu, ten co je na konci. Každý má jeden list papíru a fixu. Poslední s obálkou kreslí na papír, který má položený na zádech spoluhráče před sebou. Pokračuje to dál až k prvnímu ve vláčku, který má výsledný obrázek. Ten je potřeba vyfotit.</p>
    <button onclick="startPhoto(2)">Start</button>
  `;
}

function startPhoto(s){
  document.getElementById("app").innerHTML = `
    <h3>Vyfoťte výsledek</h3>
    <input type="file" accept="image/*" capture>
    <button onclick="finishPhoto(${s})">Hotovo</button>
  `;
}

function finishPhoto(s){
  send({station:s, answer:"PHOTO DONE"});
  confirmScreen();
}

//////////////////////////
// STATION 3 - MEMORY
//////////////////////////
function memoryRun(){
  document.getElementById("app").innerHTML = `
    <h2>Memory run</h2>
    <p>Dva hráči z vašeho týmu poběží ke krabici, kde jsou schované předměty, kdy se snažíte zapamatovat co nejvíc z nich. Dvojice běží zpět k týmu, který zapisuje předměty. Máte na to časový limit 4 minuty.</p>
    <button onclick="startMemory()">Start</button>
  `;
}

function startMemory(){
  setTimeout(()=>alert("Konec času!"),240000);
  document.getElementById("app").innerHTML = `
    <textarea id="m"></textarea>
    <button onclick="finishMemory()">Hotovo</button>
  `;
}

function finishMemory(){
  send({station:3, answer:document.getElementById("m").value});
  confirmScreen();
}

//////////////////////////
// STATION 4 - PUZZLE
//////////////////////////
let startTime;

function puzzle(){
  document.getElementById("app").innerHTML = `
    <h2>Puzzle</h2>
    <p>Jeden z vašeho týmu má zavázané oči a podle návodů od zbytku týmu se snaží co nejrychleji složit puzzle.</p>
    <button onclick="startTime=Date.now()">Start</button>
    <button onclick="finishPuzzle()">Hotovo</button>
  `;
}

function finishPuzzle(){
  const sec = Math.floor((Date.now()-startTime)/1000);
  send({station:4, answer:sec});
  confirmScreen();
}

//////////////////////////
// STATION 5 - PLAKÁT
//////////////////////////
function plakat(){
  document.getElementById("app").innerHTML = `
    <h2>Plakát</h2>
    <p>Máte před sebou obálku, která obsahuje 10 plakátů očíslované 1 až 10. Do otevřeného pole pište jaký si myslíte, že se pod plakátem skrývá film. Pište je postupně hned za sebe, pokud nevíte a nechcete tipovat, napište nevíme.</p>
    <textarea id="p"></textarea>
    <button onclick="finishPlakat()">Odeslat</button>
  `;
}

function finishPlakat(){
  send({station:5, answer:document.getElementById("p").value});
  confirmScreen();
}

//////////////////////////
// STATION 6 - NUMBER
//////////////////////////
const numQ = [
"_ dalmatinů","Fallout _","Apollo _","_ stupňů Fahrenheita",
"_ Pilots","_ rozhněvaných mužů","Ocean's _",
"Hlava _","Maroon _","_ věcí, které na tobě nesnáším"
];

let nI=0;

function numberGame(){
  document.getElementById("app").innerHTML = `
    <h2>Number</h2>
    <p>Postupně se vám ukážou slova, ke kterým patří číslo, které musíte odhalit. Např. Bylo nás _ a vy doplníte 5.</p>
    <button onclick="startNumber()">Start</button>
  `;
}

function startNumber(){
  nI=0;
  showNum();
}

function showNum(){
  document.getElementById("app").innerHTML = `
    <h2>${nI+1}/10</h2>
    <p>${numQ[nI]}</p>
    <input id="a">
    <button onclick="submitNum()">Další</button>
  `;
}

function submitNum(){
  send({station:6, question:nI+1, answer:document.getElementById("a").value});
  nI++;
  if(nI<10) showNum();
  else confirmScreen();
}

//////////////////////////
// STATION 7 - GEO
//////////////////////////
const geo = [
{img:'images/paraguay.png',opt:['Paraguay','Chile','Peru','Bolívie']},
{img:'images/vietnam.png',opt:['Thajsko','Vietnam','Laos','Kambodža']},
{img:'images/japonsko.png',opt:['Filipíny','Japonsko','Indonésie','Korea']},
{img:'images/chile.png',opt:['Chile','Argentina','Peru','Brazílie']},
{img:'images/severni-korea.png',opt:['Jižní Korea','Čína','Severní Korea','Japonsko']},
{img:'images/nizozemsko.png',opt:['Belgie','Nizozemsko','Německo','Dánsko']},
{img:'images/chorvatsko.png',opt:['Řecko','Chorvatsko','Itálie','Albánie']},
{img:'images/novy-zeland.png',opt:['Austrálie','Nový Zéland','Fidži','Papua']},
{img:'images/kuba.png',opt:['Kuba','Jamajka','Haiti','Bahamy']},
{img:'images/gronsko.png',opt:['Island','Grónsko','Norsko','Kanada']}
];

let g=0;
let lock=false;

function geoQuiz(){
  renderGeo();
}

function renderGeo(){
  let q=geo[g];
  document.getElementById("app").innerHTML = `
    <h2>${g+1}/10</h2>
    <img src="${q.imgopt.map(o=>`<button onclick="answerGeo('${o}')">${o}</button>`).join("")}
  `;
}

function answerGeo(a){
  if(lock) return;
  lock=true;

  send({station:7, question:g+1, answer:a});

  setTimeout(()=>{
    lock=false;
    g++;
    if(g<10) renderGeo();
    else confirmScreen();
  },300);
}
</script>

</body>
</html>
